name: echo_frame
description: "Your offline sanctuary for memories; Say hello to clutter-free nostalgia"

publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.5.5
  google_fonts: ^8.1.0
  day_night_themed_switcher: ^2.0.2
  go_router: ^14.0.0
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  file_picker: ^8.0.0
  window_manager: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.21.0

flutter:
  assets:
    - assets/images/
    - assets/anim/
    - assets/images/icons/