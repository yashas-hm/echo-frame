name: echo_frame
description: "Your offline sanctuary for memories; Say hello to clutter-free nostalgia"

publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.5.5
  google_fonts: ^8.1.0
  day_night_themed_switcher: ^2.0.2
  go_router: ^17.3.0
  drift: ^2.33.0
  sqlite3_flutter_libs: ^0.6.0+eol
  file_picker: ^11.0.2
  window_manager: ^0.5.1
  media_metadata_plus: ^1.4.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.33.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/anim/
    - assets/images/icons/